name: hmr-build-deploy

on:
  pull_request:
    branches:
      - "master"

defaults:
  run:
    working-directory: .

jobs:
  cancel-previous-runs:
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.1
        with:
          access_token: ${{ github.token }}

  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./.pipeline
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "24"
      - name: Set Version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Build
        run: |
          oc version
          oc login --token=${{ secrets.OPENSHIFT_TOKEN}} --server=${{ secrets.OPENSHIFT_SERVER_URL }}
          npm ci
          DEBUG=* npm run build -- --pr=${{ github.event.pull_request.number }} --git.branch.name=${{github.head_ref}} --git.ref=${{github.head_ref}} --version=${VERSION}

  deploy-to-dev:
    runs-on: ubuntu-22.04
    needs: [build]
    defaults:
      run:
        working-directory: ./.pipeline
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "24"
      - name: Set Version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Deploy using Helm
        run: |
          oc version
          oc login --token=${{ secrets.OPENSHIFT_TOKEN}} --server=${{ secrets.OPENSHIFT_SERVER_URL }}
          helm upgrade --install hmcr ./helm \
            -n d3d940-dev \
            -f ./helm/values.yaml \
            -f ./helm/values-dev.yaml \
            --set images.api.tag=${VERSION} \
            --set images.client.tag=${VERSION} \
            --set images.hangfire.tag=${VERSION}


  deploy-to-test:
    needs: [build, deploy-to-dev]
    environment:
      name: test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./.pipeline
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "24"
      - name: Set Version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Deploy using Helm
        run: |
          oc version
          oc login --token=${{ secrets.OPENSHIFT_TOKEN}} --server=${{ secrets.OPENSHIFT_SERVER_URL }}
          helm upgrade --install hmcr ./helm \
            -n d3d940-test \
            -f ./helm/values.yaml \
            -f ./helm/values-test.yaml \
            --set images.api.tag=${VERSION} \
            --set images.client.tag=${VERSION} \
            --set images.hangfire.tag=${VERSION}


  deploy-to-uat:
    needs: [build, deploy-to-test]
    environment:
      name: uat
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./.pipeline
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "24"
      - name: Set Version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Deploy using Helm
        run: |
          oc version
          oc login --token=${{ secrets.OPENSHIFT_TOKEN}} --server=${{ secrets.OPENSHIFT_SERVER_URL }}
          helm upgrade --install hmcr ./helm \
            -n d3d940-uat \
            -f ./helm/values.yaml \
            -f ./helm/values-uat.yaml \
            --set images.api.tag=${VERSION} \
            --set images.client.tag=${VERSION} \
            --set images.hangfire.tag=${VERSION}


  deploy-to-prod:
    needs: [build, deploy-to-uat]
    environment:
      name: prod
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ./.pipeline
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "24"
      - name: Set Version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Deploy using Helm
        run: |
          oc version
          oc login --token=${{ secrets.OPENSHIFT_TOKEN}} --server=${{ secrets.OPENSHIFT_SERVER_URL }}
          helm upgrade --install hmcr ./helm \
            -n d3d940-prod \
            -f ./helm/values.yaml \
            -f ./helm/values-prod.yaml \
            --set images.api.tag=${VERSION} \
            --set images.client.tag=${VERSION} \
            --set images.hangfire.tag=${VERSION}

